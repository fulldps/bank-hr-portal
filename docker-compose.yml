version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bnb_hr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bnb_hr_portal
      POSTGRES_USER: bnb_user
      POSTGRES_PASSWORD: bnb_password_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bnb_user -d bnb_hr_portal"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
